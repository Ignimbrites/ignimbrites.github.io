<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Redirecting… — ignimbrites</title>
  <script>
    /*
      GitHub Pages serves this file for any path it can't find.

      This site routes with the URL hash (e.g. #/blog), so our own links never
      hit a path the server can't serve — this is purely a safety net for
      someone typing a deep path directly. It rewrites that path into a hash
      route and bounces to the app root.

      PROJECT page  (https://user.github.io/repo/) -> keep PATH_SEGMENTS = 1
      USER/ORG page (https://user.github.io/)        -> set  PATH_SEGMENTS = 0
      Custom domain at the root                      -> set  PATH_SEGMENTS = 0
    */
    (() => {
      const PATH_SEGMENTS = 1;
      const { origin, pathname, search } = window.location;
      const segments = pathname.split("/").filter(Boolean);
      const baseSegments = segments.slice(0, PATH_SEGMENTS);
      const restSegments = segments.slice(PATH_SEGMENTS);
      const basePath = baseSegments.length ? "/" + baseSegments.join("/") + "/" : "/";
      const route = restSegments.join("/");
      window.location.replace(origin + basePath + "#/" + route + search);
    })();
  </script>
</head>
<body>
  <p style="font-family: system-ui, sans-serif; padding: 2rem">
    Redirecting… If nothing happens, <a href="./">go to the homepage</a>.
  </p>
</body>
</html>
