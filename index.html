<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>ignimbrites — Ship the source</title>
  <meta name="description" content="A build-free, dependency-free website that runs straight from static files: native ES modules, JSON imports, hash routing, and view transitions. No compile step, nothing to install." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
  <!--
    The only inline script in the whole app. It applies a saved theme before the
    first paint so there's no flash of the wrong colours. Everything else loads
    as a single ES module, below.
  -->
  <script>
    (() => {
      try {
        const saved = localStorage.getItem("ignimbrites-theme");
        if (saved === "light" || saved === "dark") {
          document.documentElement.setAttribute("data-theme", saved);
        }
      } catch (_) {
        /* storage blocked — fall back to the system preference via CSS */
      }
    })();
  </script>

  <!-- One stylesheet entry. It composes every other sheet with @layer + @import. -->
  <link rel="stylesheet" href="styles/index.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <!-- Header and footer are plain HTML fragments, included once and shared site-wide. -->
  <html-include src="partials/header.html"></html-include>

  <!-- The router swaps the contents of <main> on hash change, inside a view transition. -->
  <main id="main" tabindex="-1"></main>

  <html-include src="partials/footer.html"></html-include>

  <!-- The single import. This registers every component and starts the router. -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
